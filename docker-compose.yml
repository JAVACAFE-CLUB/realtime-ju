name: realtime-ju
x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - realtime-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  mysql:
    <<: *service-defaults
    image: mysql:8.0
    container_name: realtime-mysql
    profiles: [collector, refine, index, serving]
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --bind-address=0.0.0.0
      --skip-name-resolve
      --log-bin-trust-function-creators=1
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}" ]
      timeout: 20s
      retries: 10
      interval: 30s

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.4.0
    container_name: realtime-kafka
    hostname: kafka
    profiles: [collector, refine, index, serving]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_COMPRESSION_TYPE: 'zstd'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 268435456
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 12  # 3 → 12로 증가 (처리량 4배 향상)
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_METADATA_LOG_SEGMENT_BYTES: 33554432
      KAFKA_METADATA_LOG_MAX_RECORD_BYTES_BETWEEN_SNAPSHOTS: 2097152
      KAFKA_METADATA_MAX_RETENTION_BYTES: 104857600
      KAFKA_CONTROLLER_SNAPSHOT_MAX_NEW_RECORD_BYTES: 20971520
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server kafka:29092
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    container_name: realtime-minio
    hostname: minio
    profiles: [collector, refine]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "19000:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka-ui:
    <<: *service-defaults
    image: provectuslabs/kafka-ui:latest
    container_name: realtime-kafka-ui
    hostname: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: realtime-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    ports:
      - "19092:8080"
    profiles:
      - dev

  elasticsearch:
    <<: *service-defaults
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    container_name: realtime-elasticsearch
    profiles: [index, serving]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    <<: *service-defaults
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: realtime-kibana
    profiles: [dev, index, serving]
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "15601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Metricbeat - Elasticsearch 고급 모니터링 (선택적)
  # 필요 시 profiles에서 주석 해제
  metricbeat:
    <<: *service-defaults
    image: docker.elastic.co/beats/metricbeat:8.11.0
    container_name: realtime-metricbeat
    profiles: [monitoring]  # 기본적으로 비활성화
    depends_on:
      - elasticsearch
      - kibana
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
    command: metricbeat -e -strict.perms=false
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601

  redis:
    <<: *service-defaults
    image: redis:7.2-alpine
    container_name: realtime-redis
    profiles: [refine, serving]
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis1234}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    <<: *service-defaults
    image: mongo:7.0
    container_name: realtime-mongodb
    profiles: [refine, index]
    environment:
      MONGO_INITDB_DATABASE: realtime_ju
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/realtime_ju --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    <<: *service-defaults
    image: mongo-express:1.0-20
    container_name: realtime-mongo-express
    profiles: [dev]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: 'true'
    ports:
      - "18081:8081"

  redis-commander:
    <<: *service-defaults
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: realtime-redis-commander
    profiles: [dev]
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis1234}
    ports:
      - "18082:8081"

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:latest
    container_name: realtime-prometheus
    profiles: [refine, dev]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"

  kafka-lag-exporter:
    <<: *service-defaults
    image: seglo/kafka-lag-exporter:0.8.2
    container_name: realtime-kafka-lag-exporter
    profiles: [refine, dev]
    depends_on:
      - kafka
    volumes:
      - ./docker/kafka-lag-exporter:/opt/docker/conf
    ports:
      - "19999:9999"
    command: ["/opt/docker/bin/kafka-lag-exporter", "-Dconfig.file=/opt/docker/conf/application.conf"]

  grafana:
    <<: *service-defaults
    image: grafana/grafana:latest
    container_name: realtime-grafana
    profiles: [refine, dev]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: http://localhost:18083
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "18083:3000"

volumes:
  mysql_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local
  es_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  realtime-network:
    driver: bridge