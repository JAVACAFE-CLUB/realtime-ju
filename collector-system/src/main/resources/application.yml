server:
  port: 9080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:realtime_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:realtime_user}
    password: ${DB_PASSWORD:realtime_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      validation-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  sql:
    init:
      mode: never

logging:
  level:
    com.realtime.collector: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.apache.kafka: WARN
    org.apache.kafka.clients: WARN
    org.apache.kafka.clients.consumer: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

youtube:
  api:
    key: ${YOUTUBE_API_KEY:}

yna:
  # RSS 피드
  feeds: https://www.yna.co.kr/rss/news.xml

  # 동시성 및 요청 간 지연
  concurrency: 4
  inter-request-delay-ms: 250
  inter-request-jitter-ms: 150

  # 재시도 설정
  retry:
    max-attempts: 3
    base-backoff-ms: 200

  # HTTP 설정
  http:
    connect-timeout-ms: 2000
    response-timeout-ms: 5000
    user-agent: "Mozilla/5.0 (compatible; YnaCollector/1.0; +https://example.com/bot)"
    accept-language: "ko-KR,ko;q=0.9"
