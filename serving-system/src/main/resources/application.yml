spring:
  profiles:
    active: local
---

server:
  port: 9086

# 개발 환경 설정
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:realtime_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:realtime_user}
    password: ${DB_PASSWORD:realtime_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      validation-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis1234}

  elasticsearch:
    uris: ${ES_URI:localhost:9200}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  sql:
    init:
      mode: never

# 키워드 랭킹 스코어링 가중치
ranking:
  weights:
    source:
      NEWS_YNA: 100.0        # YNA 뉴스: 가장 높은 가중치 (실시간 트렌드)
      SNS_YOUTUBE: 5.0       # YouTube: 중간 가중치 (SNS 트렌드)
      DOCS_WIKIPEDIA: 0.1    # Wikipedia: 낮은 가중치 (배경 지식)
    recent-hour-weight: 10.0   # 최근 1시간 이내
    recent-day-weight: 5.0     # 최근 24시간 이내
    default-weight: 1.0        # 그 이상

logging:
  level:
    com.realtime.serving: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
